<!DOCTYPE html>
<html lang="{{ lang | default('de') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FoodFlow{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Шапка -->
    <header class="sticky top-0 z-50" style="background:#2a2a2a;border-bottom:0.5px solid rgba(255,255,255,0.1)">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <div style="display:flex;align-items:center;gap:8px">
      <div style="width:32px;height:32px;background:#f5c518;border-radius:50%;display:flex;align-items:center;justify-content:center">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1c1c1e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </div>
      <div style="line-height:1">
        <div style="font-size:15px;font-weight:600;color:#fff;line-height:1">Food</div>
        <div style="font-size:10px;color:#f5c518;letter-spacing:0.15em;text-transform:uppercase">Flow</div>
      </div>
    </div>
            <div class="flex items-center gap-3">
                
                <!-- Корзина -->
                <a href="/cart" class="relative">
                    <span class="text-2xl">🛒</span>
                    <span id="cart-count"
                          class="absolute -top-1 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">
                        0
                    </span>
                </a>
            </div>
        </div>
    </header>

    <!-- Контент -->
    <main class="max-w-2xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script>
        function switchLang(lang) {
            const url = new URL(window.location.href);
            url.searchParams.set('lang', lang);
            window.location.href = url.toString();
        }

        // Корзина из localStorage
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cart-count');
            if (total > 0) {
                badge.textContent = total;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }
        updateCartCount();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
