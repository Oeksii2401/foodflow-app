{% extends "base.html" %}

{% block title %}Оформление заказа — FoodFlow{% endblock %}

{% block content %}

<h2 class="text-2xl font-bold mb-4">📋 Оформление заказа</h2>

<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="font-semibold text-gray-700 mb-3">Ваши данные</h3>
    <input id="customer_name" type="text" placeholder="Имя *"
           class="w-full border rounded-lg px-3 py-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <input id="customer_phone" type="tel" placeholder="Телефон"
           class="w-full border rounded-lg px-3 py-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <input id="customer_email" type="email" placeholder="Email"
           class="w-full border rounded-lg px-3 py-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <input id="delivery_address" type="text" placeholder="Адрес доставки"
           class="w-full border rounded-lg px-3 py-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <textarea id="comment" placeholder="Комментарий к заказу" rows="2"
              class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
</div>

<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="font-semibold text-gray-700 mb-3">Ваш заказ</h3>
    <div id="order-summary" class="grid gap-2"></div>
    <div class="border-t mt-3 pt-3 flex justify-between font-bold text-lg">
        <span>Итого</span>
        <span id="order-total">0 €</span>
    </div>
</div>

<div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 mb-4 text-sm"></div>

<button onclick="submitOrder()"
        class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold text-lg hover:bg-blue-700 transition">
    Перейти к оплате →
</button>

<a href="/cart" class="block text-center text-gray-400 text-sm mt-3 underline">← Назад в корзину</a>

{% endblock %}

{% block scripts %}
<script>
    const params = new URLSearchParams(window.location.search);
    const CAFE_ID = params.get('cafe_id') || localStorage.getItem('cafe_id');

    function renderSummary() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('order-summary');
        let total = 0;
        container.innerHTML = '';
        cart.forEach(item => {
            total += item.price * item.quantity;
            container.innerHTML += `
                <div class="flex justify-between text-sm">
                    <span>${item.name} × ${item.quantity}</span>
                    <span>${(item.price * item.quantity).toFixed(2)} €</span>
                </div>`;
        });
        document.getElementById('order-total').textContent = total.toFixed(2) + ' €';
    }

    async function submitOrder() {
        const name = document.getElementById('customer_name').value.trim();
        if (!name) { showError('Пожалуйста, введите ваше имя'); return; }

        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        if (cart.length === 0) { showError('Корзина пуста'); return; }

        const payload = {
            cafe_id: parseInt(CAFE_ID),
            customer_name: name,
            customer_phone: document.getElementById('customer_phone').value || null,
            customer_email: document.getElementById('customer_email').value || null,
            delivery_address: document.getElementById('delivery_address').value || null,
            comment: document.getElementById('comment').value || null,
            language: localStorage.getItem('lang') || 'de',
            items: cart.map(i => ({ dish_id: i.id, quantity: i.quantity }))
        };

        const btn = document.querySelector('button[onclick="submitOrder()"]');
        btn.disabled = true;
        btn.textContent = 'Создаём заказ...';

        try {
            // Шаг 1: создать заказ
            const orderRes = await fetch('/orders/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!orderRes.ok) {
                const err = await orderRes.json();
                showError(err.detail || 'Ошибка при создании заказа');
                btn.disabled = false;
                btn.textContent = 'Перейти к оплате →';
                return;
            }

            const order = await orderRes.json();
            localStorage.removeItem('cart');
            localStorage.removeItem('cafe_id');

            // Шаг 2: создать Stripe Checkout Session
            btn.textContent = 'Переходим к оплате...';
            const stripeRes = await fetch(`/stripe/checkout/${order.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
            });

            if (stripeRes.ok) {
                const stripeData = await stripeRes.json();
                // Редирект на Stripe
                window.location.href = stripeData.url;
            } else {
                // Stripe не настроен — идём на страницу заказа
                window.location.href = `/order/${order.id}`;
            }

        } catch (e) {
            showError('Ошибка сети. Попробуйте ещё раз.');
            btn.disabled = false;
            btn.textContent = 'Перейти к оплате →';
        }
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    renderSummary();
</script>
{% endblock %}
