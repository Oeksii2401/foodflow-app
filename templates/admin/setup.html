<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFlow — Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-blue-600 mb-2">FoodFlow Setup</h1>
    <p class="text-gray-500 mb-8">Быстрое создание тестовых данных</p>

    <div id="log" class="bg-gray-900 text-green-400 rounded-xl p-4 mb-6 font-mono text-sm min-h-16">
        <p>Готов к работе...</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
        <h2 class="font-bold text-lg mb-4">1. Создать пользователя</h2>
        <input id="u-email" type="email" value="owner@test.com" placeholder="Email" class="w-full border rounded-lg px-3 py-2 mb-3">
        <input id="u-password" type="text" value="test123" placeholder="Пароль" class="w-full border rounded-lg px-3 py-2 mb-3">
        <input id="u-name" type="text" value="Test Owner" placeholder="Имя" class="w-full border rounded-lg px-3 py-2 mb-3">
        <button onclick="createUser()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Создать пользователя</button>
        <div id="user-result" class="mt-2 text-sm text-gray-500"></div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
        <h2 class="font-bold text-lg mb-4">2. Войти (получить токен)</h2>
        <button onclick="loginUser()" class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold">Войти как owner@test.com</button>
        <div id="token-result" class="mt-2 text-sm text-gray-500 break-all"></div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
        <h2 class="font-bold text-lg mb-4">3. Создать кафе</h2>
        <input id="c-name" type="text" value="Тестовое кафе" placeholder="Название" class="w-full border rounded-lg px-3 py-2 mb-3">
        <input id="c-desc" type="text" value="Лучшее кафе в городе" placeholder="Описание" class="w-full border rounded-lg px-3 py-2 mb-3">
        <input id="c-address" type="text" value="ул. Тестовая, 1" placeholder="Адрес" class="w-full border rounded-lg px-3 py-2 mb-3">
        <button onclick="createCafe()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Создать кафе</button>
        <div id="cafe-result" class="mt-2 text-sm text-gray-500"></div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
        <h2 class="font-bold text-lg mb-4">4. Создать категорию</h2>
        <input id="cafe-id-for-cat" type="number" value="1" placeholder="ID кафе" class="w-full border rounded-lg px-3 py-2 mb-3">
        <input id="cat-name" type="text" value="Пицца" placeholder="Название категории" class="w-full border rounded-lg px-3 py-2 mb-3">
        <button onclick="createCategory()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Создать категорию</button>
        <div id="cat-result" class="mt-2 text-sm text-gray-500"></div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
        <h2 class="font-bold text-lg mb-4">5. Добавить блюдо</h2>
        <input id="cafe-id-for-dish" type="number" value="1" placeholder="ID кафе" class="w-full border rounded-lg px-3 py-2 mb-3">
        <input id="dish-name" type="text" value="Маргарита" placeholder="Название" class="w-full border rounded-lg px-3 py-2 mb-3">
        <input id="dish-desc" type="text" value="Томат, моцарелла, базилик" placeholder="Описание" class="w-full border rounded-lg px-3 py-2 mb-3">
        <input id="dish-price" type="number" value="9.90" step="0.01" placeholder="Цена" class="w-full border rounded-lg px-3 py-2 mb-3">
        <input id="dish-cat" type="number" value="1" placeholder="ID категории" class="w-full border rounded-lg px-3 py-2 mb-3">
        <button onclick="createDish()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Добавить блюдо</button>
        <div id="dish-result" class="mt-2 text-sm text-gray-500"></div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-5">
        <h2 class="font-bold text-lg mb-3">Быстрые ссылки</h2>
        <div class="grid grid-cols-2 gap-3">
            <a href="/menu/1" target="_blank" class="bg-blue-50 text-blue-600 text-center py-2 rounded-lg font-medium">Меню кафе 1</a>
            <a href="/cart" target="_blank" class="bg-blue-50 text-blue-600 text-center py-2 rounded-lg font-medium">Корзина</a>
            <a href="/docs" target="_blank" class="bg-gray-50 text-gray-600 text-center py-2 rounded-lg font-medium">Swagger</a>
            <a href="/checkout" target="_blank" class="bg-blue-50 text-blue-600 text-center py-2 rounded-lg font-medium">Checkout</a>
        </div>
    </div>
</div>

<script>
    let TOKEN = localStorage.getItem('admin_token') || '';

    function log(msg, ok = true) {
        const el = document.getElementById('log');
        const color = ok ? 'text-green-400' : 'text-red-400';
        el.innerHTML += '<p class="' + color + '">» ' + msg + '</p>';
        el.scrollTop = el.scrollHeight;
    }

    function headers() {
        return { 'Content-Type': 'application/json', ...(TOKEN ? { 'Authorization': 'Bearer ' + TOKEN } : {}) };
    }

    async function createUser() {
        const res = await fetch('/users/', { method: 'POST', headers: headers(), body: JSON.stringify({ email: document.getElementById('u-email').value, password: document.getElementById('u-password').value, full_name: document.getElementById('u-name').value, role: 'cafe_owner' }) });
        const data = await res.json();
        if (res.ok) { log('Пользователь создан: ' + data.email + ' (id: ' + data.id + ')'); document.getElementById('user-result').textContent = 'ID: ' + data.id; }
        else { log('Ошибка: ' + data.detail, false); }
    }

    async function loginUser() {
        const form = new URLSearchParams();
        form.append('username', document.getElementById('u-email').value);
        form.append('password', document.getElementById('u-password').value);
        const res = await fetch('/users/login', { method: 'POST', body: form });
        const data = await res.json();
        if (res.ok) { TOKEN = data.access_token; localStorage.setItem('admin_token', TOKEN); log('Токен получен'); document.getElementById('token-result').textContent = TOKEN.substring(0, 40) + '...'; }
        else { log('Ошибка входа: ' + data.detail, false); }
    }

    async function createCafe() {
        const res = await fetch('/cafes/', { method: 'POST', headers: headers(), body: JSON.stringify({ name: document.getElementById('c-name').value, description: document.getElementById('c-desc').value, address: document.getElementById('c-address').value }) });
        const data = await res.json();
        if (res.ok) { log('Кафе создано: ' + data.name + ' (id: ' + data.id + ')'); document.getElementById('cafe-result').textContent = 'ID: ' + data.id; document.getElementById('cafe-id-for-cat').value = data.id; document.getElementById('cafe-id-for-dish').value = data.id; }
        else { log('Ошибка: ' + JSON.stringify(data.detail), false); }
    }

    async function createCategory() {
        const cafeId = document.getElementById('cafe-id-for-cat').value;
        const res = await fetch('/cafes/' + cafeId + '/categories/', { method: 'POST', headers: headers(), body: JSON.stringify({ name: document.getElementById('cat-name').value, sort_order: 0 }) });
        const data = await res.json();
        if (res.ok) { log('Категория создана: ' + data.name + ' (id: ' + data.id + ')'); document.getElementById('cat-result').textContent = 'ID: ' + data.id; document.getElementById('dish-cat').value = data.id; }
        else { log('Ошибка: ' + JSON.stringify(data.detail), false); }
    }

    async function createDish() {
        const cafeId = document.getElementById('cafe-id-for-dish').value;
        const res = await fetch('/cafes/' + cafeId + '/dishes/', { method: 'POST', headers: headers(), body: JSON.stringify({ name: document.getElementById('dish-name').value, description: document.getElementById('dish-desc').value, price: parseFloat(document.getElementById('dish-price').value), category_id: parseInt(document.getElementById('dish-cat').value), is_available: true, sort_order: 0 }) });
        const data = await res.json();
        if (res.ok) { log('Блюдо добавлено: ' + data.name + ' — ' + data.price + ' EUR'); document.getElementById('dish-result').textContent = 'ID: ' + data.id; }
        else { log('Ошибка: ' + JSON.stringify(data.detail), false); }
    }

    if (TOKEN) log('Токен найден в localStorage');
</script>
</body>
</html>
